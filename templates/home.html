{% load static %}

<!DOCTYPE html>
<html>
<head>

    <title>Blog Feed</title>

    <link rel="stylesheet"
          href="{% static 'css/style.css' %}">

</head>

<body>

<div class="feed">

    <h1>Blog Feed</h1>

    {% for post in posts %}

    <div class="post">
     {% if post.image %}
    <img src="{{ post.image.url }}">
    {% endif %}

        <h2>   
            <a href="/post/{{ post.id }}/">
                {{ post.title }}
            </a>
        </h2>

        <div class="date">
            {{ post.created_at }}
        </div>

        <p>
            {{ post.content }}
        </p>

    </div>

    {% endfor %}

</div>

</body>
</html>
