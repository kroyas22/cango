<!DOCTYPE html>
<html>
<head>
    <title>CanGo Blog</title>

    {% load static %}

    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>

<nav class="navbar">

    <div class="logo">
        <a href="/">CanGo Blog</a>
    </div>

    <div class="menu">

        <a href="/">Ana səhifə</a>

        {% if user.is_authenticated %}

            <a href="/profile/">Profil</a>

            <a href="/create/">Yeni Post</a>

            <a href="/logout/">Çıxış</a>

        {% else %}

            <a href="/login/">Login</a>

            <a href="/register/">Register</a>

        {% endif %}

    </div>

</nav>

<div class="container">
    {% block content %}
    {% endblock %}
</div>

</body>
</html>
